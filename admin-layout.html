<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - Ngân hàng câu hỏi</title>
<link rel="stylesheet" href="admin-layout.css">
</head>
<body>

<script>
if(localStorage.getItem("admin_logged_in") !== "yes"){
  location.href = "login.html";
}
</script>

<div class="admin-layout">

  <aside class="admin-menu">
    <h2>Admin</h2>

    <div class="menu-group-title">Quản lý nội dung</div>

    <button onclick="openPage('admin.html','Nhập JSON câu hỏi')">
      Nhập JSON câu hỏi
    </button>

    <button onclick="openPage('lessons.html','Quản lý bài upload')">
      Quản lý bài upload
    </button>

    <button onclick="openPage('categories.html','Danh mục')">
      Danh mục
    </button>

    <div class="menu-group-title">Kết quả học sinh</div>

    <button onclick="openPage('results.html','Kết quả học sinh')">
      Kết quả học sinh
    </button>

    <button onclick="openPage('students.html','Danh sách học sinh')">
      Danh sách học sinh
    </button>

    <div class="menu-group-title">Xem trang</div>

    <button onclick="openPage('index.html','Trang học sinh')">
      Trang học sinh
    </button>

    <button onclick="openPage('student-login.html','Đăng nhập học sinh')">
      Đăng nhập học sinh
    </button>

    <button class="logout" onclick="logoutAdmin()">
      Đăng xuất
    </button>
  </aside>

  <main class="admin-main">

    <div class="admin-topbar">
      <b id="pageTitle">Nhập JSON câu hỏi</b>

      <div>
        <button onclick="openNewTab()">Mở tab mới</button>
        <button onclick="reloadFrame()">Tải lại</button>
      </div>
    </div>

    <iframe id="adminFrame"></iframe>

  </main>

</div>

<script>
const pageMap = {
  "admin.html": "Nhập JSON câu hỏi",
  "lessons.html": "Quản lý bài upload",
  "lesson-edit.html": "Sửa bài upload",
  "categories.html": "Danh mục",
  "results.html": "Kết quả học sinh",
  "result-detail.html": "Chi tiết bài làm",
  "students.html": "Danh sách học sinh",
  "index.html": "Trang học sinh",
  "student-login.html": "Đăng nhập học sinh"
};

let currentPage =
  new URLSearchParams(location.search).get("page") || "admin.html";

function getBasePage(page){
  return String(page || "").split("?")[0];
}

function getPageTitle(page, title){
  const basePage = getBasePage(page);
  return title || pageMap[basePage] || page;
}

function openPage(page, title){

  currentPage = page;

  document.getElementById("adminFrame").src = page;

  document.getElementById("pageTitle").innerText =
    getPageTitle(page, title);

  history.pushState(
    {},
    "",
    "admin-layout.html?page=" + encodeURIComponent(page)
  );
}

function openNewTab(){
  window.open(
    "admin-layout.html?page=" + encodeURIComponent(currentPage),
    "_blank"
  );
}

function reloadFrame(){
  const frame = document.getElementById("adminFrame");
  frame.contentWindow.location.reload();
}

function logoutAdmin(){
  localStorage.removeItem("admin_logged_in");
  location.href = "login.html";
}

window.addEventListener("popstate", function(){
  currentPage =
    new URLSearchParams(location.search).get("page") || "admin.html";

  document.getElementById("adminFrame").src = currentPage;
  document.getElementById("pageTitle").innerText = getPageTitle(currentPage);
});

// Khi mở admin-layout.html?page=...
// tự động mở đúng trang trong iframe, kể cả trang có query như:
// admin-layout.html?page=result-detail.html%3Fid%3D...
openPage(
  currentPage,
  getPageTitle(currentPage)
);
</script>

</body>
</html>
